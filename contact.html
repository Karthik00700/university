<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <a class="logo" href="index.html">Yoda Uni<span>.</span></a>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="programs.html">Programs</a></li>
      <li><a href="research.html">Research</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="admissions.html">Admissions</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>

  <div class="page-banner">
    <h1>Contact Us</h1>
    <p>A real person will read your message and reply within two working days.</p>
  </div>

  <div class="section">
    <h2>Send a Message</h2>
    <p class="subtitle">No bots. No automated replies. Just us.</p>

    <form id="contactForm">

      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Your name" />

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Your email" />

      <label for="message">Message</label>
      <textarea id="message" placeholder="Your message..."></textarea>

      <button type="button" onclick="submitForm()">Send Message</button>

    </form>

    <div class="success-msg" id="successMessage">
      ✅ Thanks for getting in touch! We'll reply within two working days.
    </div>

  </div>


  <script src="script.js"></script>
</body>
</html>
